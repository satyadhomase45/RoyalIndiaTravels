<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet"href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="dashboard">

<h1>Welcome {{ username }}</h1>
<a href="/logout">Logout</a>
<a href="/booking">New Booking</a>

<h2>Your Booking History</h2>

<table>
<tr>
<th>ID</th>
<th>Package</th>
<th>Persons</th>
<th>Date</th>
</tr>

{% for row in bookings %}
<tr>
<td>{{ row[0] }}</td>
<td>{{ row[3] }}</td>
<td>{{ row[4] }}</td>
<td>{{ row[5] }}</td>
</tr>
{% endfor %}

</table>

</div>

</body>
</html>
