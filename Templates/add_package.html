<!DOCTYPE html>
<html>
<head>
<title>Add Package</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<section class="booking-page">

<h2>Add New Tour Package</h2>

<form method="POST" class="booking-form">

<input type="text" name="name" placeholder="Package Name" required>
<input type="text" name="image" placeholder="Image Name (goa.jpg)" required>
<input type="text" name="days" placeholder="4 Days / 3 Nights" required>
<input type="text" name="price" placeholder="12999" required>
<input type="text" name="category" placeholder="Beach / Hill" required>

<input type="submit" value="Add Package">

</form>

</section>

</body>
</html>
